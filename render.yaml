# Despliegue en Render con Docker (mismo enfoque que el POS). App Node simple;
# el contenedor la corre reproduciblemente. Plan free: la demo "duerme" tras 15 min
# de inactividad y despierta en segundos — suficiente para una demo.
services:
  - type: web
    name: sincronizacion-tv-demo
    runtime: docker
    plan: free
    healthCheckPath: /healthz

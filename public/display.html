<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Senalizacion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #000;
  }
  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
  }
  .slide.active { opacity: 1; }

  #empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 2.2vw;
    gap: 12px;
    text-align: center;
  }
  #empty span.small { font-size: 1.3vw; color: #383838; }

  #clock {
    position: absolute;
    bottom: 24px;
    right: 32px;
    color: rgba(255,255,255,0.55);
    font-size: 1.1vw;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    z-index: 5;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="empty">
      <div>Sin imagenes asignadas</div>
      <span class="small">Sube fotos desde el panel de administracion</span>
    </div>
  </div>
  <div id="clock"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/display.js"></script>
</body>
</html>
